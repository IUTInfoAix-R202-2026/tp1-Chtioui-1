# GitHub Classroom autograding workflow.
# Le bloc autograding (steps Classroom + reporter) est régénéré par
# update-autograding.sh en fonction des sous-paquets d'exercices
# détectés. Ne pas éditer à la main le bloc entre marqueurs.
name: GitHub Classroom Workflow

on: [push]

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Autograding
    if: github.repository != 'IUTInfoAix-R202/template-tp-javafx'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          java-package: 'jdk+fx'
          cache: maven

      #@@@AUTOGRADING-BEGIN@@@ (généré par update-autograding.sh, ne pas éditer à la main)
      - name: Compilation
        id: compilation
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Compilation
          setup-command: ""
          command: ./mvnw -B -q compile
          timeout: 5
          max-score: 100

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          COMPILATION_RESULTS: "${{ steps.compilation.outputs.result }}"
        with:
          runners: compilation
      #@@@AUTOGRADING-END@@@
